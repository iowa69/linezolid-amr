{% set name = "linezolid-amr" %}
{% set version = "0.1.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/iowa69/linezolid-amr/archive/refs/tags/v{{ version }}.tar.gz
  sha256: PLACEHOLDER_SHA256

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  entry_points:
    - linezolid-amr = linezolid_amr.cli:main
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=64
  run:
    - python >=3.9
    - click >=8.0
    - pysam >=0.22
    - biopython >=1.81
    - ncbi-amrfinderplus >=4.0
    - minimap2 >=2.24
    - samtools >=1.18
    - bcftools >=1.18
    - mlst >=2.19

test:
  imports:
    - linezolid_amr
    - linezolid_amr.cli
    - linezolid_amr.amrfinder
    - linezolid_amr.mlst
    - linezolid_amr.rrna23s
    - linezolid_amr.references
    - linezolid_amr.summary
  commands:
    - linezolid-amr --version
    - linezolid-amr --help
    - linezolid-amr list-organisms

about:
  home: https://github.com/iowa69/linezolid-amr
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Integrated AMR profiling (AMRFinderPlus + MLST) + 23S rRNA linezolid-resistance frequency analysis
  description: |
    linezolid-amr combines NCBI AMRFinderPlus gene/mutation detection on an
    assembly with species-aware mapping of raw reads to 23S rRNA references to
    detect heteroresistant linezolid-resistance mutations (e.g. G2576T, G2505A)
    in Staphylococcus aureus, Enterococcus faecalis/faecium, and Streptococcus
    pneumoniae. MLST (Seemann) runs first to infer the organism and ST. The
    same organism drives both AMRFinderPlus species mode and 23S reference
    selection. Mutations are reported in E. coli K-12 23S numbering (clinical
    convention) via a pairwise-alignment-derived position map. Outputs
    include a per-sample wide CSV (Kleborate-style) and a long CSV.
  dev_url: https://github.com/iowa69/linezolid-amr
  doc_url: https://github.com/iowa69/linezolid-amr#readme

extra:
  recipe-maintainers:
    - iowa69
